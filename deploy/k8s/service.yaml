apiVersion: v1
kind: Service
metadata:
  name: xboot
  namespace: xboot
  labels:
    app.kubernetes.io/name: xboot
    app.kubernetes.io/component: service
    app.kubernetes.io/part-of: xboot
spec:
  # ClusterIP for internal cluster access
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  selector:
    app.kubernetes.io/name: xboot

---
# Alternative: NodePort for direct node access
# Use this if you need to access XBOOT from outside the cluster
# without an ingress controller
#
# apiVersion: v1
# kind: Service
# metadata:
#   name: xboot-nodeport
#   namespace: xboot
# spec:
#   type: NodePort
#   ports:
#   - name: http
#     port: 8080
#     targetPort: http
#     nodePort: 30080  # Fixed node port
#   selector:
#     app.kubernetes.io/name: xboot

---
# Alternative: LoadBalancer for cloud deployments
# Use this in cloud environments (AWS, GCP, Azure) to get a load balancer
#
# apiVersion: v1
# kind: Service
# metadata:
#   name: xboot-lb
#   namespace: xboot
#   annotations:
#     # Cloud provider specific annotations
#     service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
#     service.beta.kubernetes.io/aws-load-balancer-internal: "true"
# spec:
#   type: LoadBalancer
#   ports:
#   - name: http
#     port: 8080
#     targetPort: http
#   selector:
#     app.kubernetes.io/name: xboot
#   # Internal only (no public internet)
#   # externalTrafficPolicy: Local
