# XBOOT Secrets Configuration
# 
# IMPORTANT: This is a template/example. DO NOT commit real secrets to git.
# 
# To use:
# 1. Copy this file and fill in your actual secrets
# 2. Apply with: kubectl apply -f secret.yaml -n xboot
# 3. Or use external-secrets operator for production
#
# Secrets required:
# - api_keys.json: API keys for authentication (hashed in prod mode)
# - pepper: Random 32-byte hex string for API key hashing
# - keyring.json: (optional) Public keys for template signature verification

apiVersion: v1
kind: Secret
metadata:
  name: xboot-secrets
  namespace: xboot
  labels:
    app.kubernetes.io/name: xboot
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # API keys file - JSON format with hashed keys
  # Generate with: python3 scripts/make_api_keys.py --count 5 --out - | base64
  # Or manually create and base64 encode
  api_keys.json: |
    {
      "keys": [
        {
          "id": "example-key-1",
          "hashed_key": "sha256:abcd1234...",
          "created_at": "2024-01-01T00:00:00Z",
          "description": "Example key - REPLACE WITH REAL KEYS"
        }
      ]
    }
  
  # Pepper secret - 32 bytes hex encoded
  # Generate with: openssl rand -hex 32
  pepper: "REPLACE_WITH_64_CHARACTER_HEX_STRING_FROM_OPENSSL_RAND_HEX_32"
  
  # (Optional) Keyring for template signature verification
  # Only needed if ZEROBOOT_REQUIRE_TEMPLATE_SIGNATURES=true
  keyring.json: |
    {
      "version": "1.0.0",
      "keys": [
        {
          "key_id": "example-signing-key",
          "public_key_pem": "-----BEGIN PUBLIC KEY-----\nMIIB...\n-----END PUBLIC KEY-----",
          "purpose": "template-signing",
          "created_at": "2024-01-01T00:00:00Z"
        }
      ]
    }

---
# Alternative: Using sealed-secrets (recommended for production)
# 
# Install sealed-secrets controller:
#   helm install sealed-secrets sealed-secrets/sealed-secrets
#
# Encrypt your secret:
#   kubeseal --format yaml < secret.yaml > sealed-secret.yaml
#
# Apply the sealed secret:
#   kubectl apply -f sealed-secret.yaml
#
# The controller will decrypt and create the real secret in the cluster.

