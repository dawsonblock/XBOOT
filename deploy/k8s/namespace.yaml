apiVersion: v1
kind: Namespace
metadata:
  name: xboot
  labels:
    app.kubernetes.io/name: xboot
    app.kubernetes.io/component: sandbox-runtime
    app.kubernetes.io/part-of: xboot
    # Prevent general workloads from being scheduled here
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
  annotations:
    description: "XBOOT sandbox runtime namespace - requires privileged pods for KVM access"
