apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: xboot
  namespace: xboot
  labels:
    app.kubernetes.io/name: xboot
    app.kubernetes.io/component: runtime
    app.kubernetes.io/part-of: xboot
    app.kubernetes.io/version: "0.1.0"
    # Use DaemonSet when you want one pod per KVM node
    deployment.type: daemonset
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: xboot
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1  # Update one node at a time
  template:
    metadata:
      labels:
        app.kubernetes.io/name: xboot
        app.kubernetes.io/component: runtime
        app.kubernetes.io/part-of: xboot
        deployment.type: daemonset
      annotations:
        checksum/secrets: "${CHECKSUM_SECRETS}"
        checksum/config: "${CHECKSUM_CONFIG}"
    spec:
      # Only schedule on nodes labeled for KVM workloads
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: sandbox.kvm
                operator: In
                values: ["true"]
      
      # Tolerate the sandbox taint
      tolerations:
      - key: "sandbox.kvm"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      
      # Use host network for direct device access
      hostNetwork: true
      
      # Use host PID namespace for process visibility (optional, for debugging)
      # hostPID: true
      
      securityContext:
        runAsUser: 0
      
      containers:
      - name: xboot
        image: xboot-runtime:latest
        imagePullPolicy: IfNotPresent
        
        securityContext:
          privileged: true
          allowPrivilegeEscalation: true
          readOnlyRootFilesystem: true
          capabilities:
            add:
            - SYS_ADMIN
        
        ports:
        - name: http
          containerPort: 8080
          hostPort: 8080  # Bind to host port directly
          protocol: TCP
        
        env:
        - name: ZEROBOOT_AUTH_MODE
          value: "prod"
        - name: ZEROBOOT_API_KEYS_FILE
          value: "/etc/zeroboot/api_keys.json"
        - name: ZEROBOOT_API_KEY_PEPPER_FILE
          value: "/etc/zeroboot/pepper"
        - name: ZEROBOOT_REQUEST_LOG_PATH
          value: "/var/lib/zeroboot/requests.jsonl"
        - name: ZEROBOOT_LOG_CODE
          value: "false"
        - name: ZEROBOOT_REQUIRE_TEMPLATE_HASHES
          value: "true"
        - name: ZEROBOOT_REQUIRE_TEMPLATE_SIGNATURES
          value: "false"
        - name: ZEROBOOT_ALLOWED_FIRECRACKER_VERSION
          value: "1.12.0"
        - name: ZEROBOOT_HEALTH_CACHE_TTL_SECS
          value: "10"
        - name: ZEROBOOT_MIN_FREE_BYTES
          value: "536870912"
        - name: ZEROBOOT_MIN_FREE_INODES
          value: "10000"
        - name: ZEROBOOT_MAX_REQUEST_BODY_BYTES
          value: "262144"
        - name: ZEROBOOT_MAX_CODE_BYTES
          value: "131072"
        - name: ZEROBOOT_MAX_TIMEOUT_SECS
          value: "30"
        - name: ZEROBOOT_MAX_CONCURRENT_REQUESTS
          value: "32"
        - name: TEMPLATE_DIRS
          value: "python:/var/lib/zeroboot/current/templates/python,node:/var/lib/zeroboot/current/templates/node"
        - name: RELEASE_ROOT
          value: "/var/lib/zeroboot/current"
        - name: VERIFY_ON_STARTUP
          value: "true"
        # Node-specific identifier for logging/metrics
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        
        volumeMounts:
        - name: dev-kvm
          mountPath: /dev/kvm
        
        # DaemonSet uses hostPath for release tree
        # Each node must have the release tree at this path
        - name: xboot-release
          mountPath: /var/lib/zeroboot/current
          readOnly: true
        
        - name: xboot-secrets
          mountPath: /etc/zeroboot
          readOnly: true
        
        # DaemonSet uses hostPath for state (node-local)
        - name: xboot-state
          mountPath: /var/lib/zeroboot
        
        - name: tmp
          mountPath: /tmp
        
        livenessProbe:
          httpGet:
            path: /live
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 60
          periodSeconds: 5
          timeoutSeconds: 10
          failureThreshold: 6
        
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
      
      volumes:
      - name: dev-kvm
        hostPath:
          path: /dev/kvm
          type: CharDevice
      
      # DaemonSet: mount release tree from host
      # Each node must have the release at /var/lib/zeroboot/current
      - name: xboot-release
        hostPath:
          path: /var/lib/zeroboot/current
          type: Directory
      
      - name: xboot-secrets
        secret:
          secretName: xboot-secrets
          defaultMode: 0400
      
      # DaemonSet: use local storage for state per node
      - name: xboot-state
        hostPath:
          path: /var/lib/zeroboot/state
          type: DirectoryOrCreate
      
      - name: tmp
        emptyDir:
          medium: Memory
          sizeLimit: 100Mi
